<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divine Lettering Studio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Divine Lettering Studio</h1>
<p>Create Christian Verse Designs</p>
</header>

<div class="container">

<textarea id="verse" placeholder="Enter Bible verse or quote"></textarea>

<select id="font">
<option>Arial</option>
<option>Georgia</option>
<option>Verdana</option>
<option>Times New Roman</option>
</select>

<button onclick="generateDesign()">
Generate Design
</button>

<div id="designArea">

<div id="designText">
Your Verse Here
</div>

<div id="signature">
Designed by Jeff
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
